name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main # Akan berjalan otomatis setiap kali ada push ke branch main

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20' # Diperbarui ke versi 20 karena Vite/Rolldown membutuhkannya

    - name: Install Dependencies
      run: npm install

    - name: Build Project
      run: npm run build

    - name: Sync files to Hostinger FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: ./ # Ubah ke root karena user FTP Hostinger biasanya langsung mengarah ke public_html
